services:
  trello-sync:
    build: .
    container_name: trello-sync
    restart: unless-stopped
    ports:
      - "8891:8891"
    environment:
      - TRELLO_API_KEY=${TRELLO_API_KEY}
      - TRELLO_TOKEN=${TRELLO_TOKEN}
      - DATABASE_URL=${DATABASE_URL}
      - SYNC_INTERVAL_MINUTES=${SYNC_INTERVAL_MINUTES:-60}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - ser9-shared

networks:
  ser9-shared:
    external: true
    name: ser9-shared
