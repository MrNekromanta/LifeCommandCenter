services:
  trello-sync:
    build: .
    container_name: trello-sync
    restart: unless-stopped
    ports:
      - "8891:8891"
    environment:
      - TRELLO_API_KEY=${TRELLO_API_KEY}
      - TRELLO_TOKEN=${TRELLO_TOKEN}
      - DATABASE_URL=${DATABASE_URL}
      - SYNC_INTERVAL_MINUTES=${SYNC_INTERVAL_MINUTES:-60}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - ser9-shared

    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8891/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  ser9-shared:
    external: true
    name: ser9-shared
